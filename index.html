<!DOCTYPE html>
<html lang="hy">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Envelope Open Animation</title>
  <style>
    /* reset & base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: #E9E5DC;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* envelope layers */
    .top-triangle,
    .bottom-triangle {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      transition: transform 1.5s cubic-bezier(0.77, 0, 0.18, 1);
      will-change: transform;
      pointer-events: none;
    }

    .top-triangle {
      top: 50%;
      transform: translate(-50%, -50%);
      margin-top: -10%;
    }

    .bottom-triangle {
      bottom: 50%;
      transform: translate(-50%, 50%);
      margin-bottom: -10%;
    }

    .top-triangle img,
    .bottom-triangle img {
      width: 100%;
      display: block;
      max-width: 700px;
      margin: 0 auto;
    }

    .bottom-triangle img {
      transform: rotate(180deg);
    }

    /* seal – absolute center, clickable */
    .seal {
      position: absolute;
      width: 110px;
      height: 110px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity 0.3s ease, transform 0.15s ease;
    }

    .seal img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      border-radius: 50%;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
    }

    .seal:active {
      transform: translate(-50%, -50%) scale(0.92);
    }

    /* ===== OPEN STATE ===== */
    .open .top-triangle {
      transform: translate(-50%, -50%) translateY(-120%);
    }

    .open .bottom-triangle {
      transform: translate(-50%, 50%) translateY(120%);
    }

    /* seal disappears */
    .open .seal {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.5);
      pointer-events: none;
      transition: opacity 0.5s ease, transform 0.6s ease;
    }

    /* second screen */
    .second-screen {
      position: absolute;
      inset: 0;
      background: #E9E5DC;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transition: opacity 1s ease 0.6s;
      z-index: 1;
      pointer-events: none;
      padding: 1.5rem;
      text-align: center;
    }

    .open .second-screen {
      opacity: 1;
      pointer-events: auto;
    }

    .second-screen h1 {
      font-family: 'Georgia', 'Times New Roman', serif;
      color: #4a4a4a;
      font-size: clamp(2rem, 10vw, 3.8rem);
      letter-spacing: 2px;
      background: rgba(255, 255, 240, 0.4);
      padding: 0.8rem 2rem;
      border-radius: 60px;
      backdrop-filter: blur(2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.04);
    }

    /* ===== MOBILE TWEAKS - իրար կպցնելու համար ===== */
    @media (max-width: 600px) {
      .top-triangle {
        margin-top: -3%;
      }

      .bottom-triangle {
        margin-bottom: -3%;
      }

      .top-triangle img,
      .bottom-triangle img {
        max-width: 500px;
      }

      .open .top-triangle {
        transform: translate(-50%, -50%) translateY(-100%);
      }

      .open .bottom-triangle {
        transform: translate(-50%, 50%) translateY(100%);
      }

      .seal {
        width: 90px;
        height: 90px;
      }

      .second-screen h1 {
        font-size: clamp(1.8rem, 9vw, 3rem);
        padding: 0.6rem 1.2rem;
      }
    }

    @media (max-width: 400px) {
      .top-triangle {
        margin-top: -1%;
      }

      .bottom-triangle {
        margin-bottom: -1%;
      }

      .top-triangle img,
      .bottom-triangle img {
        max-width: 380px;
      }

      .open .top-triangle {
        transform: translate(-50%, -50%) translateY(-85%);
      }

      .open .bottom-triangle {
        transform: translate(-50%, 50%) translateY(85%);
      }

      .seal {
        width: 75px;
        height: 75px;
      }
    }

    /* large desktop */
    @media (min-width: 1024px) {
      .top-triangle {
        margin-top: -7%;
      }

      .bottom-triangle {
        margin-bottom: -7%;
      }

      .top-triangle img,
      .bottom-triangle img {
        max-width: 900px;
      }

      .seal {
        width: 140px;
        height: 140px;
      }

      .open .top-triangle {
        transform: translate(-50%, -50%) translateY(-130%);
      }

      .open .bottom-triangle {
        transform: translate(-50%, 50%) translateY(130%);
      }
    }

    /* background texture */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 40%, rgba(220,215,200,0.2) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>
<body>

  <div class="top-triangle">
    <img src="https://uploads.onecompiler.io/43gpeysj6/1784542378318/image-removebg-preview.png" alt="envelope top">
  </div>

  <div class="bottom-triangle">
    <img src="https://uploads.onecompiler.io/43gpeysj6/1784542378318/image-removebg-preview.png" alt="envelope bottom">
  </div>

  <div class="seal" id="sealBtn" role="button" aria-label="Open envelope">
    <img src="https://uploads.onecompiler.io/43gpeysj6/1784535804737/wss1.png" alt="seal">
  </div>

  <div class="second-screen">
    <h1>Երկրորդ էջ</h1>
  </div>

  <script>
    (function() {
      const seal = document.getElementById('sealBtn');

      function openEnvelope(e) {
        if (document.body.classList.contains('open')) return;
        document.body.classList.add('open');
        seal.style.pointerEvents = 'none';
      }

      seal.addEventListener('click', openEnvelope);
      seal.addEventListener('touchstart', function(e) {
        if (document.body.classList.contains('open')) {
          e.preventDefault();
          return;
        }
        openEnvelope(e);
      }, { passive: false });
    })();
  </script>

</body>
</html>
