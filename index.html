<!DOCTYPE html>
<html lang="hy">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Envelope Open Animation</title>
  <style>
    /* reset & base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background: #E9E5DC;
      font-family: Arial, sans-serif;
      /* mobile-first: full viewport */
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* envelope layers */
    .top-triangle,
    .bottom-triangle {
      position: absolute;
      left: 50%;
      width: 140%;            /* wider for mobile, but keep it scaled */
      max-width: 700px;       /* cap on large screens */
      transform: translateX(-50%);
      z-index: 2;
      transition: transform 1.5s cubic-bezier(0.77, 0, 0.18, 1);
      will-change: transform;
      pointer-events: none;   /* allow click-through to seal */
    }

    .top-triangle {
      top: -10%;              /* overlap top edge */
    }

    .bottom-triangle {
      bottom: -10%;
    }

    .top-triangle img,
    .bottom-triangle img {
      width: 100%;
      display: block;
    }

    .bottom-triangle img {
      transform: rotate(180deg);
    }

    /* seal – absolute center, clickable */
    .seal {
      position: absolute;
      width: 120px;
      height: 120px;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity 0.3s ease, transform 0.15s ease;
      border-radius: 50%;
      
    }

    .seal img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      border-radius: 50%;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
    }

    .seal:active {
      transform: translate(-50%, -50%) scale(0.92);
    }

    /* open state: triangles fly away */
    .open .top-triangle {
      transform: translateX(-50%) translateY(-120vh);
    }

    .open .bottom-triangle {
      transform: translateX(-50%) translateY(120vh);
    }

    /* seal disappears (fade + scale) */
    .open .seal {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.5);
      pointer-events: none;   /* no more clicks */
      transition: opacity 0.5s ease, transform 0.6s ease;
    }

    /* second screen – hidden initially, fades in after triangles move */
    .second-screen {
      position: absolute;
      inset: 0;
      background: #E9E5DC;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transition: opacity 1s ease 0.6s; /* delay matches animation */
      z-index: 1;
      pointer-events: none;
      padding: 1.5rem;
      text-align: center;
    }

    .open .second-screen {
      opacity: 1;
      pointer-events: auto;
    }

    .second-screen h1 {
      font-family: 'Georgia', 'Times New Roman', serif;
      color: #4a4a4a;
      font-size: clamp(2rem, 10vw, 3.8rem);
      letter-spacing: 2px;
      background: rgba(255, 255, 240, 0.4);
      padding: 0.8rem 2rem;
      border-radius: 60px;
      backdrop-filter: blur(2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.04);
    }

    /* mobile adjustments: smaller seal, tighter fit */
    @media (max-width: 600px) {
      .top-triangle,
      .bottom-triangle {
        width: 160%;
        max-width: 500px;
      }

      .top-triangle {
        top: -5%;
      }

      .bottom-triangle {
        bottom: -5%;
      }

      .seal {
        width: 90px;
        height: 90px;
      }

      .second-screen h1 {
        font-size: clamp(1.8rem, 9vw, 3rem);
        padding: 0.6rem 1.2rem;
      }
    }

    /* very small screens */
    @media (max-width: 400px) {
      .top-triangle,
      .bottom-triangle {
        width: 180%;
        max-width: 380px;
      }

      .seal {
        width: 75px;
        height: 75px;
      }
    }

    /* large desktop: keep elegant */
    @media (min-width: 1024px) {
      .top-triangle,
      .bottom-triangle {
        width: 130%;
        max-width: 900px;
      }

      .seal {
        width: 140px;
        height: 140px;
      }
    }

    /* extra: subtle background texture (optional) */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 40%, rgba(220,215,200,0.2) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>
<body>

  <!-- top triangle (envelope flap) -->
  <div class="top-triangle">
    <img src="image-removebg-preview.png" alt="envelope top">
  </div>

  <!-- bottom triangle (envelope bottom) -->
  <div class="bottom-triangle">
    <img src="image-removebg-preview.png" alt="envelope bottom">
  </div>

  <!-- seal / click trigger -->
  <div class="seal" id="sealBtn" role="button" aria-label="Open envelope">
    <img src="https://uploads.onecompiler.io/43gpeysj6/1784535804737/wss1.png" alt="seal">
  </div>

  <!-- second page (reveals on open) -->
  <div class="second-screen">
    <h1>Երկրորդ էջ</h1>
  </div>

  <script>
    (function() {
      const seal = document.getElementById('sealBtn');

      function openEnvelope(e) {
        // Prevent multiple triggers
        if (document.body.classList.contains('open')) return;

        // Add 'open' class to body – triggers all CSS transitions
        document.body.classList.add('open');

        // (optional) disable seal click after opening
        seal.style.pointerEvents = 'none';
      }

      // attach click event to seal
      seal.addEventListener('click', openEnvelope);

      // also support touch devices (tap)
      seal.addEventListener('touchstart', function(e) {
        // prevent double-firing on mobile
        if (document.body.classList.contains('open')) {
          e.preventDefault();
          return;
        }
        // small delay to let the :active style show, but we open anyway
        openEnvelope(e);
      }, { passive: false });

      // Fallback: if user clicks anywhere else? no, only seal.

      // for debugging / reset (optional double-click body to reset – but we keep it clean)
      // we don't provide reset to keep experience consistent.
      // if you want to reset for testing, uncomment next lines (but not in production)
      // document.body.addEventListener('dblclick', function() {
      //   document.body.classList.remove('open');
      //   seal.style.pointerEvents = 'auto';
      // });
    })();
  </script>

</body>
</html>
